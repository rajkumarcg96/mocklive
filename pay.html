<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सिक्योर पेमेंट - ज्ञान कम्प्यूटर</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 30px 20px; background: #f0f2f5; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; border-top: 5px solid #1a73e8; }
        .btn { display: block; background: #1a73e8; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 6px rgba(26,115,232,0.3); transition: 0.3s; border:none; cursor: pointer; width: 100%; }
        .btn:hover { background: #1557b0; }
        .qr-box { margin-top: 25px; padding: 15px; border: 2px dashed #e0e0e0; border-radius: 8px; background: #fafafa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .utr-section { margin-top: 25px; background: #e8f0fe; padding: 20px; border-radius: 8px; border-left: 4px solid #1a73e8; text-align: left; }
        .utr-section input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        .btn-submit { background: #28a745; margin-top: 10px; font-size: 16px;}
        .btn-submit:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #1a73e8; margin-top: 0;">ज्ञान कम्प्यूटर अकादमी</h2>
        <p style="color: #555; font-size: 15px;">अपना पेमेंट पूरा करने के लिए भुगतान करें</p>
        <h1 id="amountDisplay" style="color: #28a745; font-size: 40px; margin: 10px 0;">₹0</h1>
        
        <div id="loader" class="loader"></div>

        <a id="payBtn" href="#" class="btn"><i class="fas fa-mobile-alt"></i> PhonePe/GPay से पेमेंट करें</a>
        
        <div class="qr-box">
            <p style="font-size: 13px; color: #666; font-weight: bold; margin-top: 0;">या यह QR कोड स्कैन करें:</p>
            <img id="qrImage" src="" alt="UPI QR" style="width: 150px; height: 150px; border-radius: 10px; margin-top: 10px;">
            <p style="margin-top: 5px; font-family: monospace; font-size: 14px;" id="upiIdDisplay"></p>
        </div>
        
        <div class="utr-section" id="utrBox">
            <h4 style="margin: 0; color: #333;"><i class="fas fa-check-circle" style="color:#28a745;"></i> पेमेंट कर दिया?</h4>
            <p style="font-size: 13px; color: #555; margin: 5px 0;">पेमेंट करने के बाद PhonePe/GPay से 12 अंकों का UTR/Ref नंबर यहाँ दर्ज करें:</p>
            <input type="text" id="utrInput" placeholder="उदा: 312345678901" maxlength="12">
            <button class="btn btn-submit" id="submitBtn" onclick="submitUtr()">वेरीफाई के लिए भेजें</button>
        </div>
        
        <div id="successMsg" style="display:none; margin-top:20px; color:#28a745; font-weight:bold; font-size:16px;">
            <i class="fas fa-check-circle" style="font-size:30px; display:block; margin-bottom:10px;"></i>
            आपका UTR नंबर एडमिन को भेज दिया गया है। 5-10 मिनट में आपका आईडी चालू हो जाएगा।
        </div>
    </div>

    <script>
        // 👇 अपना असली Google Script URL यहाँ डालें! 👇
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuUL6GRkOTyB6s6a4c5aYf-qybA8plvMXIismC-5Du0onqFbPXLb3__qJjwrvN-sM_GQ/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const pa = urlParams.get('pa') || '8878038225@ybl';
        const pn = urlParams.get('pn') || 'Gyan Computer';
        const am = urlParams.get('am') || '0';
        const userId = urlParams.get('user') || ''; // यूज़र की आईडी मिलेगी

        document.getElementById('amountDisplay').innerText = '₹' + am;
        document.getElementById('upiIdDisplay').innerText = 'UPI ID: ' + pa;
        
        const upiString = `upi://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR`;
        document.getElementById('payBtn').href = upiString;
        document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upiString)}`;

        if(/Android|iPhone|iPad/i.test(navigator.userAgent)) {
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => { window.location.href = upiString; }, 1500);
        }

        // UTR भेजने का फंक्शन
        function submitUtr() {
            const utr = document.getElementById("utrInput").value.trim();
            if(utr.length < 10) { alert("कृपया सही UTR / Reference नंबर डालें!"); return; }
            if(!userId) { alert("यूज़र आईडी नहीं मिली! कृपया लिंक दोबारा खोलें।"); return; }

            const btn = document.getElementById("submitBtn");
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> भेज रहे हैं...';
            btn.disabled = true;

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "submitUtr", username: userId, utr: utr })
            }).then(res => res.json()).then(data => {
                if(data.status === "success") {
                    document.getElementById("utrBox").style.display = "none";
                    document.getElementById("successMsg").style.display = "block";
                } else {
                    alert("एरर: " + data.message);
                    btn.innerHTML = 'वेरीफाई के लिए भेजें'; btn.disabled = false;
                }
            }).catch(e => { alert("नेटवर्क एरर!"); btn.innerHTML = 'वेरीफाई के लिए भेजें'; btn.disabled = false; });
        }
    </script>
</body>
</html>
