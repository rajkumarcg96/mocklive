<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सुपर एडमिन - ज्ञान कम्प्यूटर</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7fe; color: #333; }
        .admin-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: #2c3e50; }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        .login-box button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #adminDashboard { display: none; }
        .header { background: #1a73e8; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px; max-width: 1200px; margin: auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid #1a73e8; }
        .stat-card h3 { color: #555; font-size: 15px; margin-bottom: 10px; }
        .stat-card h1 { color: #1a73e8; font-size: 32px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 0; flex-wrap: wrap;}
        .tab-btn { background: #e9ecef; border: none; padding: 12px 25px; border-radius: 8px 8px 0 0; font-size: 15px; font-weight: bold; cursor: pointer; color: #495057; }
        .tab-btn.active { background: white; color: #1a73e8; border-top: 3px solid #1a73e8; }
        .table-wrapper { display: none; background: white; padding: 20px; border-radius: 0 8px 8px 8px; overflow-x: auto; }
        .table-wrapper.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: #333; font-size: 14px; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; display: inline-block;}
        .bg-active { background: #28a745; } .bg-pending { background: #f0ad4e; } .bg-blocked { background: #dc3545; }
        .bg-verify { background: #6f42c1; } /* UTR Verify Color */
        #addStudentModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="admin-login" id="loginScreen">
        <div class="login-box">
            <h2 style="color: #1a73e8; margin-bottom: 10px;"><i class="fas fa-user-shield"></i> एडमिन लॉगिन</h2>
            <input type="password" id="adminPass" placeholder="पासवर्ड दर्ज करें">
            <button onclick="loginAdmin()">प्रवेश करें</button>
        </div>
    </div>

    <div id="adminDashboard">
        <div class="header">
            <h2><i class="fas fa-cogs"></i> ज्ञान कम्प्यूटर - सुपर एडमिन</h2>
            <button onclick="logoutAdmin()" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">बाहर निकलें</button>
        </div>
        <div class="container">
            <div class="stats">
                <div class="stat-card"><h3>कुल छात्र</h3><h1 id="totalCount">0</h1></div>
                <div class="stat-card" style="border-color:#28a745;"><h3>सक्रिय</h3><h1 id="activeCount" style="color:#28a745;">0</h1></div>
                <div class="stat-card" style="border-color:#dc3545;"><h3>ब्लॉक</h3><h1 id="blockedCount" style="color:#dc3545;">0</h1></div>
                <div class="stat-card" style="border-color:#f0ad4e;"><h3>कुल प्राप्त राशि</h3><h1 id="totalRevenue" style="color:#f0ad4e;">₹0</h1></div>
            </div>

            <button onclick="openAddModal()" style="background:#1a73e8; color:white; border:none; padding:12px 25px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom: 20px;">
                <i class="fas fa-user-plus"></i> नया छात्र जोड़ें (Quick Reg)
            </button>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tabStudents', this)">छात्र (Students)</button>
            </div>

            <div id="tabStudents" class="table-wrapper active">
                <table id="studentsTable">
                    <thead><tr><th>तारीख</th><th>नाम / मोबाइल</th><th>आईडी (User)</th><th>भुगतान / UTR</th><th>पैकेज</th><th>स्थिति</th><th>एक्शन</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="addStudentModal">
        <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:450px; position:relative;">
            <span onclick="closeAddModal()" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px;">&times;</span>
            <h3 style="margin-bottom:20px; color:#1a73e8;"><i class="fas fa-user-plus"></i> त्वरित रजिस्ट्रेशन</h3>
            <input type="text" id="addName" placeholder="कैंडिडेट का नाम" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            <input type="number" id="addMobile" placeholder="मोबाइल नंबर" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            <input type="email" id="addEmail" placeholder="ईमेल आईडी" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            
            <label style="font-size:12px;">पैकेज चुनें:</label>
            <select id="addPkg" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
                <option value="Weekly (7 Days)">7 दिन (₹99)</option>
                <option value="Monthly (30 Days)">30 दिन (₹299)</option>
            </select>

            <label style="font-size:12px;">पेमेंट का तरीका:</label>
            <select id="addPayMode" style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; background:#f0f7ff;">
                <option value="SendLink">📱 ईमेल पर Payment Link भेजें</option>
                <option value="Cash">💵 कैश मिल गया (डायरेक्ट चालू करें)</option>
                <option value="AlreadyPaid">🔄 पेमेंट फंस गया था</option>
            </select>

            <button id="addBtn" onclick="adminAddNewStudent()" style="width:100%; background:#28a745; color:white; border:none; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">रजिस्ट्रेशन पूरा करें</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxuUL6GRkOTyB6s6a4c5aYf-qybA8plvMXIismC-5Du0onqFbPXLb3__qJjwrvN-sM_GQ/exec"; 
        let savedPass = localStorage.getItem("adminLoginPass") || "";

        window.onload = function() { if (savedPass) { document.getElementById("loginScreen").style.display = "none"; document.getElementById("adminDashboard").style.display = "block"; fetchData(); } };

        function loginAdmin() {
            let pass = document.getElementById("adminPass").value;
            if(!pass) return;
            localStorage.setItem("adminLoginPass", pass); savedPass = pass;
            document.getElementById("loginScreen").style.display = "none"; document.getElementById("adminDashboard").style.display = "block"; fetchData();
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.table-wrapper').forEach(t => t.classList.remove('active'));
            btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        }

        function fetchData() {
            fetch(scriptURL + "?action=getAdminData&adminPass=" + savedPass).then(res => res.json()).then(data => {
                if(data.status === "error") { logoutAdmin(); return; }
                renderStudents(data.students || []);
            });
        }

        function renderStudents(students) {
            let active = 0, blocked = 0, totalRev = 0, html = "";
            document.getElementById("totalCount").innerText = students.length;
            students.forEach(s => {
                let statusClass = "bg-pending", approveBtn = "";
                if(s.status === "Active") { statusClass = "bg-active"; active++; }
                else if(s.status === "Blocked") { statusClass = "bg-blocked"; blocked++; }
                else if(s.status === "Paid-Verify") { 
                    statusClass = "bg-verify"; 
                    approveBtn = `<button onclick="approveUser('${s.username}', this)" style="background:#28a745; color:white; border:none; padding:5px 10px; border-radius:4px; width:100%; margin-bottom:5px; cursor:pointer;">✅ Approve</button>`;
                }
                totalRev += parseInt(s.amount) || 0;
                html += `<tr>
                    <td><small>Reg: ${s.regDate}</small></td>
                    <td><b>${s.name}</b><br><small>${s.mobile}</small></td>
                    <td><code>${s.username}</code></td>
                    <td><b style="color:green;">₹${s.amount}</b><br><small style="color:#6f42c1; font-weight:bold;">${s.paymentId}</small></td>
                    <td>${s.package}</td>
                    <td><span class="status-badge ${statusClass}">${s.status}</span></td>
                    <td>
                        ${approveBtn}
                        <button onclick="changeStatus(${s.rowId}, 'Active')" style="padding:4px; margin-bottom:4px; width:100%;">Active</button>
                        <button onclick="changeStatus(${s.rowId}, 'Blocked')" style="padding:4px; margin-bottom:4px; width:100%;">Block</button>
                        <button onclick="deleteUser(${s.rowId})" style="background:#dc3545; color:white; border:none; padding:4px; width:100%; border-radius:4px;"><i class="fas fa-trash"></i> Delete</button>
                    </td>
                </tr>`;
            });
            document.getElementById("tableBody").innerHTML = html;
            document.getElementById("activeCount").innerText = active;
            document.getElementById("blockedCount").innerText = blocked;
            document.getElementById("totalRevenue").innerText = "₹" + totalRev;
        }

        function approveUser(username, btn) {
            if(!confirm("UTR चेक कर लिया? Approve करते ही ID/Pass चला जाएगा!")) return;
            btn.innerText = "Processing..."; btn.disabled = true;
            fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "approveStudent", adminPass: savedPass, username: username }) }).then(res => res.json()).then(data => { fetchData(); });
        }

        function changeStatus(rowId, newStatus) {
            fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "updateStatus", adminPass: savedPass, rowId: rowId, newStatus: newStatus }) }).then(res => res.json()).then(data => { fetchData(); });
        }

        function deleteUser(rowId) {
            if(!confirm("कैंडिडेट डिलीट करें?")) return;
            fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "deleteStudent", adminPass: savedPass, rowId: rowId }) }).then(res => res.json()).then(data => { fetchData(); });
        }

        function openAddModal() { document.getElementById("addStudentModal").style.display = "flex"; }
        function closeAddModal() { document.getElementById("addStudentModal").style.display = "none"; }

        function adminAddNewStudent() {
            let name = document.getElementById("addName").value, mobile = document.getElementById("addMobile").value, email = document.getElementById("addEmail").value;
            let pkg = document.getElementById("addPkg").value, payMode = document.getElementById("addPayMode").value;
            if(!name || !mobile || !email) return alert("Fill all fields");
            document.getElementById("addBtn").innerText = "प्रोसेसिंग...";
            fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "adminAddStudent", adminPass: savedPass, name: name, mobile: mobile, email: email, pkg: pkg, payMode: payMode }) })
            .then(res => res.json()).then(data => {
                alert("सफल!"); closeAddModal(); fetchData(); document.getElementById("addBtn").innerText = "रजिस्ट्रेशन पूरा करें";
            });
        }
        function logoutAdmin() { localStorage.removeItem("adminLoginPass"); location.reload(); }
    </script>
</body>
</html>
