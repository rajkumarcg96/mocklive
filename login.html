<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कैंडिडेट लॉगिन - ज्ञान कम्प्यूटर (आधार मॉक टेस्ट)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px; width: 100%; text-align: center;
        }
        .logo {
            width: 80px; height: 80px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; color: white; font-size: 35px; box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        h2 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        p { color: #667eea; font-size: 14px; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; font-size: 14px; }
        input {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; background-color: #f8f9fa; transition: 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; background-color: white; }
        
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.4); }
        
        #message { margin-top: 15px; font-size: 14px; font-weight: bold; display: none; padding: 10px; border-radius: 8px;}
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #cce5ff; color: #004085; }
        .loader { display: none; margin-top: 15px; color: #667eea; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo"><i class="fas fa-fingerprint"></i></div>
        <h2>कैंडिडेट लॉगिन पोर्टल</h2>
        <p>आधार मॉक टेस्ट (NSEIT) शुरू करने के लिए लॉगिन करें</p>

        <div class="input-group">
            <label><i class="fas fa-user"></i> लॉगिन आईडी (Login ID)</label>
            <input type="text" id="username" placeholder="ईमेल पर प्राप्त आईडी दर्ज करें">
        </div>

        <div class="input-group">
            <label><i class="fas fa-lock"></i> पासवर्ड (Password)</label>
            <input type="password" id="password" placeholder="अपना पासवर्ड दर्ज करें">
        </div>

        <button class="login-btn" onclick="loginStudent()">लॉगिन करें <i class="fas fa-arrow-right"></i></button>

        <div class="loader" id="loader"><i class="fas fa-spinner fa-spin"></i> आपकी जानकारी जांची जा रही है...</div>
        <div id="message"></div>
    </div>

    <script>
        function loginStudent() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const msgBox = document.getElementById("message");
            const loader = document.getElementById("loader");

            if(user === "" || pass === "") {
                showMessage("कृपया आईडी और पासवर्ड दोनों दर्ज करें!", "error");
                return;
            }

            msgBox.style.display = "none";
            loader.style.display = "block";

            // 👇 आपका सही Web App URL यहाँ है 👇
            const scriptURL = "https://script.google.com/macros/s/AKfycbxuUL6GRkOTyB6s6a4c5aYf-qybA8plvMXIismC-5Du0onqFbPXLb3__qJjwrvN-sM_GQ/exec";
            
            const finalURL = `${scriptURL}?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

            fetch(finalURL)
            .then(response => response.json())
            .then(data => {
                loader.style.display = "none";
                
                // 1. अगर कैंडिडेट पहली बार टेस्ट देने आया है या रेगुलर लॉगिन है
                if(data.status === "success") {
                    showMessage(`स्वागत है ${data.name}! आपको डैशबोर्ड पर ले जाया जा रहा है...`, "success");
                    
                    // डेटा और सिक्योरिटी टोकन (Session Token) ब्राउज़र में सेव करें
                    localStorage.setItem("studentName", data.name);
                    localStorage.setItem("studentID", user);
                    localStorage.setItem("sessionToken", data.sessionToken); 
                    
                    // 1.5 सेकंड बाद डैशबोर्ड पर भेजें
                    setTimeout(() => {
                        window.location.replace("dashboard.html"); 
                    }, 1500);
                } 
                
                // 2. अगर कैंडिडेट पहले ही टेस्ट दे चुका है (सिर्फ एक बार वाला पैकेज)
                else if(data.status === "already_done") {
                    showMessage(`नमस्ते ${data.name}, आप यह मॉक टेस्ट दे चुके हैं।`, "info");
                    
                    document.querySelector('.login-container').innerHTML = `
                        <div style="text-align:center; padding: 10px;">
                            <i class="fas fa-chart-pie" style="font-size:60px; color:#f0ad4e;"></i>
                            <h2 style="margin-top:20px; color:#2c3e50;">मॉक टेस्ट परिणाम (Score)</h2>
                            <p style="font-size:18px;">कैंडिडेट: <b>${data.name}</b></p>
                            
                            <div style="background:#e8f0fe; padding:30px; border-radius:15px; margin:25px 0; border:2px solid #1a73e8;">
                                <p style="margin:0; font-size:16px; color:#1a73e8; font-weight:bold;">कुल प्राप्त अंक</p>
                                <h1 style="font-size:64px; margin:10px 0; color:#d32f2f;">${data.score}</h1>
                            </div>
                            
                            <p style="color:#e67e22; font-weight:bold; margin-bottom: 20px;">यह मॉक टेस्ट केवल एक बार दिया जा सकता है।</p>
                            <a href="index.html" style="text-decoration:none; color:white; background:#1a73e8; padding: 10px 20px; border-radius: 8px; font-weight:bold;">
                                <i class="fas fa-home"></i> होम पेज
                            </a>
                        </div>
                    `;
                }
                
                // 3. अगर आईडी या पासवर्ड गलत है / एक्सपायर है / ब्लॉक है
                else {
                    showMessage(data.message, "error");
                }
            })
            .catch(error => {
                loader.style.display = "none";
                showMessage("सर्वर से कनेक्ट नहीं हो पा रहा है। इंटरनेट चेक करें।", "error");
                console.error('Error:', error);
            });
        }

        function showMessage(text, type) {
            const msgBox = document.getElementById("message");
            msgBox.textContent = text;
            msgBox.className = type;
            msgBox.style.display = "block";
        }
    </script>
</body>
</html>
