<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आधार ट्रेनिंग मॉड्यूल - ज्ञान कम्प्यूटर</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; }
        
        .header { background-color: #1a73e8; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 22px; margin: 0; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        
        /* Screens */
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Chapter Grid */
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .chapter-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; position: relative; overflow: hidden; border-left: 5px solid #1a73e8; }
        .chapter-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .chapter-card.locked { opacity: 0.7; border-left-color: #6c757d; cursor: not-allowed; }
        .chapter-card.locked::after { content: '\f023'; font-family: "Font Awesome 5 Free"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: rgba(0,0,0,0.1); }
        .chapter-card h3 { color: #2c3e50; margin-bottom: 10px; font-size: 20px; }
        .chapter-card p { color: #5f6368; font-size: 14px; margin-bottom: 15px; }
        .btn-study { background: #1a73e8; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* Study Mode */
        .qa-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .qa-box h4 { color: #2c3e50; margin-bottom: 10px; }
        .correct-ans { color: #28a745; font-weight: bold; background: #d4edda; padding: 10px; border-radius: 5px; border: 1px solid #c3e6cb; }
        .study-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-test { background: #f0ad4e; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Test Mode */
        .test-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .timer-badge { background: #d32f2f; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; float: right; }
        .option-lbl { display: block; padding: 12px; background: #f8f9fa; border: 1px solid #dee2e6; margin-bottom: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .option-lbl:hover { background: #e9ecef; }
        .option-lbl input { margin-right: 10px; transform: scale(1.2); }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn-nav { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        
        /* Result */
        .result-box { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .score-circle { width: 120px; height: 120px; background: #1a73e8; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: bold; margin: 0 auto 20px; }

        /* --- New: Language Selection Screen & Loader CSS --- */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 2500; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .lang-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .lang-select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 16px; margin-bottom: 25px; outline: none; }
        .btn-start { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn-start:hover { background-color: #218838; }
        
        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); display:flex; justify-content:center; align-items:center; flex-direction:column; z-index: 3000; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #1a73e8; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
   /* डैशबोर्ड बटन के लिए विशेष स्टाइल */
.btn-dashboard {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* पर्पल-ब्लू ग्रेडिएंट */
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-dashboard:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
    opacity: 0.9;
}


   </style>
</head>
<body>

    <div class="overlay-screen" id="languageScreen">
        <div class="lang-box">
            <i class="fas fa-language" style="font-size: 50px; color: #1a73e8; margin-bottom: 20px;"></i>
            <h2 style="color: #2c3e50; margin-bottom: 10px;">ट्रेनिंग की भाषा चुनें</h2>
            <p style="color: #5f6368; margin-bottom: 25px;">Select Training Language</p>
            
            <select id="trainingLanguage" class="lang-select">
                <option value="Hindi">हिंदी (Hindi)</option>
                <option value="English">English</option>
            </select>
            
            <button onclick="startFetchingQuestions()" class="btn-start"><i class="fas fa-play"></i> ट्रेनिंग शुरू करें / Start</button>
            <br><br>
            <a href="dashboard.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;"><i class="fas fa-arrow-left"></i> डैशबोर्ड पर वापस जाएँ</a>
        </div>
    </div>

    <div class="loader" id="loader" style="display: none;">
        <div class="spinner"></div>
        <h3 style="margin-top: 15px; color: #1a73e8;">चैप्टर लोड हो रहे हैं...</h3>
    </div>

    <div class="header">
        <h2><i class="fas fa-book-reader"></i> आधार ट्रेनिंग मॉड्यूल</h2>
        <div>
            <span id="studentNameDisplay" style="margin-right: 15px; font-weight: bold;"></span>
            
            <button onclick="window.onbeforeunload = null; window.location.href='dashboard.html';" class="btn-dashboard" id="homeBtn">
    <i class="fas fa-home"></i> डैशबोर्ड पर जाएँ
</button>

            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> बाहर निकलें</button>
        </div>
    </div>

    <div class="container">
        <div id="screenChapters" class="screen">
            <h3 style="margin-bottom: 20px; color: #2c3e50;"><i class="fas fa-list"></i> प्रशिक्षण अध्याय (Chapters) चुनें</h3>
            <div class="chapter-grid" id="chapterGrid">
                </div>
        </div>

        <div id="screenStudy" class="screen">
            <div class="study-header">
                <button onclick="showScreen('screenChapters')" class="btn-nav" style="background: #6c757d;"><i class="fas fa-arrow-left"></i> वापस जाएँ</button>
                <h3 id="studyChapterTitle" style="color: #1a73e8;">अध्याय 1</h3>
                <button onclick="startChapterTest()" class="btn-test"><i class="fas fa-edit"></i> चैप्टर टेस्ट दें (10 Marks)</button>
            </div>
            <div id="studyContent">
                </div>
        </div>

        <div id="screenTest" class="screen">
            <div class="test-container">
                <div class="timer-badge"><i class="fas fa-clock"></i> <span id="time">10:00</span></div>
                <h3 id="testChapterTitle" style="margin-bottom: 20px; color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px;"></h3>
                
                <h4 style="color: #5f6368; margin-bottom: 15px;">प्रश्न <span id="qNum">1</span>/10</h4>
                <h3 id="testQuestion" style="margin-bottom: 20px;"></h3>
                
                <div id="testOptions"></div>
                
                <div class="nav-btns">
                    <button onclick="prevQ()" class="btn-nav" style="background: #6c757d;" id="btnPrev"><i class="fas fa-chevron-left"></i> पिछला</button>
                    <button onclick="nextQ()" class="btn-nav" style="background: #1a73e8;" id="btnNext">अगला <i class="fas fa-chevron-right"></i></button>
                    <button onclick="submitTest()" class="btn-nav" style="background: #28a745; display: none;" id="btnSubmit"><i class="fas fa-paper-plane"></i> टेस्ट सबमिट करें</button>
                </div>
            </div>
        </div>

        <div id="screenResult" class="screen">
            <div class="result-box">
                <i id="resIcon" class="fas fa-check-circle" style="font-size: 60px; color: #28a745; margin-bottom: 15px;"></i>
                <h2 id="resTitle" style="margin-bottom: 15px;">टेस्ट समाप्त!</h2>
                <div class="score-circle"><span id="resScore">0</span>/10</div>
                <h3 id="resMessage" style="margin-bottom: 25px;"></h3>
                
                <button onclick="showScreen('screenChapters')" class="btn-nav" style="background: #1a73e8; padding: 12px 30px; font-size: 16px;"><i class="fas fa-list"></i> अध्यायों पर वापस जाएँ</button>
            </div>
        </div>
    </div>

    <script>
        // 👇 अपना Web App URL यहाँ डालें 👇
        const googleScriptURL = "https://script.google.com/macros/s/AKfycbxuUL6GRkOTyB6s6a4c5aYf-qybA8plvMXIismC-5Du0onqFbPXLb3__qJjwrvN-sM_GQ/exec";
        
        let allQuestions = [];
        let currentChapterNum = 1;
        let testQuestions = [];
        let testAnswers = [];
        let currentQIndex = 0;
        let timerInterval;
        let currentLang = "Hindi";
        
        // Chapters names based on PDF (Hindi/English Support)
        const chapterNames = {
            "Hindi": {
                "1": "यूआईडीएआई और आधार का परिचय",
                "2": "रजिस्ट्रार, नामांकन एजेंसियां और कर्मचारी",
                "3": "ऑन-बोर्डिंग नामांकन एजेंसी और कर्मचारी",
                "4": "आधार नामांकन / अद्यतन प्रक्रिया",
                "5": "जनसांख्यिकीय और बायोमेट्रिक विवरण कैप्चर करना",
                "6": "अपवाद प्रबंधन (Exception Handling)",
                "7": "नामांकन की गुणवत्ता के लिए दिशानिर्देश",
                "8": "अपराध और दंड",
                "9": "ग्राहक संतुष्टि और धोखाधड़ी से बचाव"
            },
            "English": {
                "1": "Introduction to UIDAI and Aadhaar",
                "2": "Registrars, Enroling Agencies and Enrolment Staff",
                "3": "On-boarding Enrolment Agency and Staff",
                "4": "Aadhaar Enrolment / Update Process",
                "5": "Capturing Demographic and Biometric Details",
                "6": "Exception Handling",
                "7": "Guidelines for Enrolment Quality",
                "8": "Offences and Penalties",
                "9": "Customer Satisfaction and Avoiding Fraud"
            }
        };
// 1. ब्राउज़र के 'Back' बटन को रोकना (PushState Trick)
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
    alert("सुरक्षा चेतावनी: परीक्षा के दौरान 'Back' बटन का उपयोग वर्जित है!");
};

// 2. Refresh (F5) और Ctrl+R जैसे कीबोर्ड शॉर्टकट को ब्लॉक करना
document.addEventListener('keydown', function (e) {
    // F5 key
    if (e.which === 116) {
        e.preventDefault();
    }
    // Ctrl + R या Command + R
    if ((e.ctrlKey || e.metaKey) && e.which === 82) {
        e.preventDefault();
    }
    // Alt + Left Arrow (Back shortcut)
    if (e.altKey && e.which === 37) {
        e.preventDefault();
    }
});

// 3. पेज रिफ्रेश या बंद करने पर 'Confirmation' डायलॉग दिखाना
window.onbeforeunload = function() {
    return "क्या आप वाकई परीक्षा छोड़ना चाहते हैं? आपका अनसेव्ड डेटा खो सकता है।";
};

// ⚠️ ध्यान दें: सबमिट बटन के फंक्शन (processResult) के अंदर 
// window.onbeforeunload = null; 
// लिखना ज़रूरी है, ताकि सबमिट होने के बाद यह अलर्ट न आए।
       

	   // --- पेज लोड होने पर ---
        window.onload = function() {
            let studentName = localStorage.getItem("studentName");
            if(!studentName) {
                alert("कृपया पहले लॉगिन करें!");
                window.location.replace("login.html");
                return;
            }
            document.getElementById("studentNameDisplay").innerText = "नमस्ते, " + studentName;
            // प्रश्न लोड नहीं करेंगे, पहले भाषा चुनने वाला बॉक्स दिखाएंगे
        };

        // --- भाषा चुनकर प्रश्न लोड करना ---
        function startFetchingQuestions() {
            currentLang = document.getElementById("trainingLanguage").value;
            
            document.getElementById("languageScreen").style.display = "none";
            document.getElementById("loader").style.display = "flex";

            // यहाँ &module=training और &lang=SelectedLang भेजा जा रहा है
            fetch(googleScriptURL + "?action=getQuestions&module=training&lang=" + currentLang + "&t=" + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                if(data.status === "success" && data.data.length > 0) {
                    allQuestions = data.data;
                    renderChapters();
                    document.getElementById("loader").style.display = "none";
                    showScreen("screenChapters"); // चैप्टर की ग्रिड दिखाएं
                } else {
                    document.getElementById("loader").style.display = "none";
                    document.getElementById("languageScreen").style.display = "flex";
                    alert("इस भाषा में ट्रेनिंग प्रश्न उपलब्ध नहीं हैं! कृपया एडमिन से संपर्क करें।");
                }
            })
            .catch(err => {
                document.getElementById("loader").style.display = "none";
                document.getElementById("languageScreen").style.display = "flex";
                alert("इंटरनेट समस्या! प्रश्न लोड नहीं हो सके।");
                console.error(err);
            });
        }

        // --- बाकी का लॉजिक (लॉक/अनलॉक, टेस्ट आदि) ---
        function getUnlockedChapters() {
            return JSON.parse(localStorage.getItem("unlockedChapters")) || [1]; 
        }

        function renderChapters() {
            const grid = document.getElementById("chapterGrid");
            grid.innerHTML = "";
            let unlocked = getUnlockedChapters();

            for(let i = 1; i <= 9; i++) {
                let isLocked = !unlocked.includes(i);
                let lockClass = isLocked ? "locked" : "";
                
                let lockAlert = currentLang === "English" ? `alert('Pass Chapter ${i-1} test with 65% to unlock!')` : `alert('पहले अध्याय ${i-1} का टेस्ट 65% अंकों के साथ पास करें!')`;
                let onClick = isLocked ? lockAlert : `openStudyMode(${i})`;
                
                let title = chapterNames[currentLang][i.toString()] || `Chapter ${i}`;
                let chapterText = currentLang === "English" ? "Chapter" : "अध्याय";
                let btnText = currentLang === "English" ? "Start Study <i class='fas fa-arrow-right'></i>" : "पढ़ाई शुरू करें <i class='fas fa-arrow-right'></i>";
                
                grid.innerHTML += `
                    <div class="chapter-card ${lockClass}" onclick="${onClick}">
                        <h3>${chapterText} ${i}</h3>
                        <p>${title}</p>
                        ${isLocked ? '<span style="color:#d32f2f; font-weight:bold;"><i class="fas fa-lock"></i> Locked</span>' : `<button class="btn-study">${btnText}</button>`}
                    </div>
                `;
            }
        }

        function openStudyMode(chapNum) {
            currentChapterNum = chapNum;
            let chapterText = currentLang === "English" ? "Chapter" : "अध्याय";
            document.getElementById("studyChapterTitle").innerText = `${chapterText} ${chapNum}: ` + (chapterNames[currentLang][chapNum] || "");
            
            let chapQuestions = allQuestions.filter(q => q.chapter == chapNum);
            
            if(chapQuestions.length === 0) {
                let msg = currentLang === "English" ? "No questions available in this chapter." : "इस अध्याय में अभी कोई प्रश्न उपलब्ध नहीं है।";
                alert(msg);
                return;
            }

            let html = "";
            chapQuestions.forEach((q, index) => {
                let correctOpt = q.options[q.answer];
                let ansText = currentLang === "English" ? "Correct Answer" : "सही उत्तर";
                html += `
                    <div class="qa-box">
                        <h4>Q${index + 1}: ${q.question}</h4>
                        <p class="correct-ans"><i class="fas fa-check-circle"></i> ${ansText}: ${correctOpt}</p>
                    </div>
                `;
            });
            
            document.getElementById("studyContent").innerHTML = html;
            showScreen("screenStudy");
        }

        function startChapterTest() {
            let chapQuestions = allQuestions.filter(q => q.chapter == currentChapterNum);
            
            let shuffled = chapQuestions.sort(() => 0.5 - Math.random());
            testQuestions = shuffled.slice(0, 10);
            
            if(testQuestions.length < 10) {
                let msg = currentLang === "English" ? "Need at least 10 questions for the test." : "टेस्ट के लिए कम से कम 10 प्रश्न होने चाहिए।";
                alert(msg);
                return;
            }

            testAnswers = new Array(10).fill(null);
            currentQIndex = 0;
            
            let chapterText = currentLang === "English" ? "Chapter" : "अध्याय";
            let testText = currentLang === "English" ? "Practice Test" : "प्रैक्टिस टेस्ट";
            
            document.getElementById("testChapterTitle").innerText = `${chapterText} ${currentChapterNum} - ${testText}`;
            showScreen("screenTest");
            loadTestQuestion();
            startTimer(10 * 60); 
        }

        function loadTestQuestion() {
            document.getElementById("qNum").innerText = currentQIndex + 1;
            let q = testQuestions[currentQIndex];
            document.getElementById("testQuestion").innerText = q.question;
            
            let optHtml = "";
            q.options.forEach((opt, i) => {
                let isChecked = (testAnswers[currentQIndex] === i) ? "checked" : "";
                optHtml += `
                    <label class="option-lbl">
                        <input type="radio" name="tOpt" value="${i}" ${isChecked} onchange="testAnswers[currentQIndex]=${i}"> ${opt}
                    </label>
                `;
            });
            document.getElementById("testOptions").innerHTML = optHtml;

            document.getElementById("btnPrev").style.visibility = (currentQIndex === 0) ? "hidden" : "visible";
            
            if(currentQIndex === 9) {
                document.getElementById("btnNext").style.display = "none";
                document.getElementById("btnSubmit").style.display = "inline-block";
            } else {
                document.getElementById("btnNext").style.display = "inline-block";
                document.getElementById("btnSubmit").style.display = "none";
            }
        }

        function prevQ() { if(currentQIndex > 0) { currentQIndex--; loadTestQuestion(); } }
        function nextQ() { if(currentQIndex < 9) { currentQIndex++; loadTestQuestion(); } }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById("time").innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if(seconds <= 0) { clearInterval(timerInterval); submitTest(); }
                seconds--;
            }, 1000);
        }

        function submitTest() {
            clearInterval(timerInterval);
            let score = 0;
            testQuestions.forEach((q, i) => {
                if(testAnswers[i] === q.answer) score++;
            });

            document.getElementById("resScore").innerText = score;
            
            if(score >= 7) {
                document.getElementById("resIcon").className = "fas fa-trophy";
                document.getElementById("resIcon").style.color = "#f0ad4e";
                document.getElementById("resTitle").innerText = currentLang === "English" ? "Congratulations! You Passed." : "बधाई हो! आप पास हो गए।";
                document.getElementById("resMessage").innerText = currentLang === "English" ? "Next Chapter has been unlocked!" : "अगला अध्याय (Chapter) अनलॉक कर दिया गया है!";
                document.getElementById("resMessage").style.color = "#28a745";
                
                let unlocked = getUnlockedChapters();
                if(!unlocked.includes(currentChapterNum + 1) && currentChapterNum < 9) {
                    unlocked.push(currentChapterNum + 1);
                    localStorage.setItem("unlockedChapters", JSON.stringify(unlocked));
                }
            } else {
                document.getElementById("resIcon").className = "fas fa-times-circle";
                document.getElementById("resIcon").style.color = "#d32f2f";
                document.getElementById("resTitle").innerText = currentLang === "English" ? "Test Failed!" : "टेस्ट फेल!";
                document.getElementById("resMessage").innerText = currentLang === "English" ? "You need at least 7 marks (65%) to unlock the next chapter." : "अगले अध्याय में जाने के लिए कम से कम 7 अंक (65%) आवश्यक हैं।";
                document.getElementById("resMessage").style.color = "#d32f2f";
            }
            
            renderChapters();
            showScreen("screenResult");
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function logout() {
            if(confirm("क्या आप वाकई अपनी आईडी से बाहर (Logout) जाना चाहते हैं?")) {
                localStorage.removeItem("studentName");
                localStorage.removeItem("studentID");
                window.location.replace("login.html");
            }
        }

window.addEventListener('keydown', function (e) {
    // F5 key
    if (e.key === 'F5' || e.keyCode === 116) {

    // Ctrl+R ya Cmd+R
    if ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.keyCode === 82)) {

    }
