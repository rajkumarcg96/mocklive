<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ज्ञान कम्प्यूटर - आधार मॉक टेस्ट रजिस्ट्रेशन</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px; min-height: 100vh; display: flex;
            justify-content: center; align-items: center; position: relative; overflow-x: hidden;
        }
        @media (max-height: 800px) { body { align-items: flex-start; } }
        
        .registration-container {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 50px 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 1;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            z-index: -1;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo {
            width: 80px; height: 80px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .logo i { color: white; font-size: 40px; }
        h2 { color: #2c3e50; font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: #667eea; font-size: 14px; font-weight: 500; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="tel"], select {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; transition: all 0.3s ease; background-color: #f8f9fa;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; background-color: white; }

        /* रेफरल बॉक्स */
        .referral-box {
            background: #f1f8e9; border: 1px dashed #7cb342; padding: 15px; border-radius: 10px; margin-bottom: 20px;
        }
        .referral-box label { color: #33691e; }
        .referral-box input { border-color: #aed581; background: white; }
        .referral-box input:focus { border-color: #7cb342; }

        /* नियम व शर्तें */
        .terms-group {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e0e0e0;
        }
        .terms-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #1a73e8; }
        .terms-group label { margin-bottom: 0; font-size: 13px; color: #5f6368; cursor: pointer; font-weight: normal; line-height: 1.4; }
        .terms-group label a { color: #1a73e8; text-decoration: underline; font-weight: bold; }

        .fee-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px;
            border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: 600; display: none;
        }
        .fee-display.active { display: block; }

        .pay-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease;
        }
        .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4); }
        .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .loading { display: none; text-align: center; color: #667eea; margin-top: 15px; font-weight: 600; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e0e0; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed; top: 20px; right: 20px; background: white; padding: 15px 20px; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); z-index: 1000; display: none; font-weight: bold;
        }
        .toast.success { border-left: 5px solid #27ae60; color: #27ae60; }
        .toast.error { border-left: 5px solid #e74c3c; color: #e74c3c; }
        .toast.info { border-left: 5px solid #1a73e8; color: #1a73e8; }
        
        .success-box { display: none; text-align: center; margin-top: 20px; padding: 15px; background: #d4edda; color: #155724; border-radius: 10px; font-weight: bold; border: 1px solid #c3e6cb;}
    </style>
</head>
<body>

    <div class="registration-container">
        <div class="header">
            <div class="logo"><i class="fas fa-id-card"></i></div> <h2>आधार मॉक टेस्ट</h2>
            <p class="subtitle">ज्ञान कम्प्यूटर अकादमी (NSEIT तैयारी)</p>
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="studentName"><i class="fas fa-user" style="color: #667eea; margin-right: 8px;"></i>कैंडिडेट का नाम</label>
                <input type="text" id="studentName" required placeholder="आधार कार्ड के अनुसार अपना नाम लिखें">
            </div>

            <div class="form-group">
                <label for="studentClass"><i class="fas fa-laptop-code" style="color: #667eea; margin-right: 8px;"></i>मॉक टेस्ट पैकेज (सब्सक्रिप्शन) चुनें</label>
                <select id="studentClass" required onchange="updateFee()">
                    <option value="">टेस्ट पैकेज चुनें</option>
                    <option value="Weekly (7 Days)">साप्ताहिक पैकेज - 7 दिन (₹99)</option>
                    <option value="Monthly (30 Days)">मासिक पैकेज - 30 दिन (₹299)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mobileNo"><i class="fas fa-phone" style="color: #667eea; margin-right: 8px;"></i>मोबाइल नंबर</label>
                <input type="tel" id="mobileNo" required placeholder="10 अंकों का मोबाइल नंबर" maxlength="10">
            </div>

            <div class="form-group">
                <label for="emailId"><i class="fas fa-envelope" style="color: #667eea; margin-right: 8px;"></i>ईमेल आईडी</label>
                <input type="email" id="emailId" required placeholder="अपना ईमेल लिखें (लॉगिन आईडी के लिए)">
            </div>

            <div class="fee-display" id="feeDisplay"></div>

            <div class="referral-box">
                <label for="regReferral"><i class="fas fa-gift" style="margin-right: 5px;"></i> रेफरल कोड (वैकल्पिक / Optional):</label>
                <input type="text" id="regReferral" placeholder="दोस्त की ID (उदा: UIDAI1234)">
                <small style="color: #558b2f; display: block; margin-top: 8px;">*यह कोड डालने पर आपके दोस्त की आईडी वैधता 5 दिन बढ़ जाएगी!</small>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="agreeTerms">
                <label for="agreeTerms">मैंने मॉक टेस्ट के सभी <a href="rules.html" target="_blank">नियम व शर्तें</a> पढ़ ली हैं और मैं पूर्णतः सहमत हूँ।</label>
            </div>
            
            <button type="button" class="pay-btn" id="payBtn" onclick="checkDuplicateAndPay()">
                <i class="fas fa-lock" style="margin-right: 8px;"></i>रजिस्ट्रेशन फीस जमा करें
            </button>

            <div class="loading" id="loading"><span class="spinner"></span>कृपया प्रतीक्षा करें...</div>
            <div class="success-box" id="successBox"></div>
        </form>
    </div>

    <div id="toastMessage" class="toast"></div>

    <script>
        let feeAmount = 0;
        
        // 👇 आपका Web App URL यहाँ है 👇
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbxuUL6GRkOTyB6s6a4c5aYf-qybA8plvMXIismC-5Du0onqFbPXLb3__qJjwrvN-sM_GQ/exec';

        function updateFee() {
            const classGroup = document.getElementById("studentClass").value;
            const feeDisplay = document.getElementById("feeDisplay");
            
            if(classGroup === "Weekly (7 Days)") { 
                feeAmount = 99; 
                feeDisplay.innerHTML = 'फीस: ₹99 (वैलिडिटी: 7 दिन)'; 
                feeDisplay.classList.add("active"); 
            } 
            else if(classGroup === "Monthly (30 Days)") { 
                feeAmount = 299; 
                feeDisplay.innerHTML = 'फीस: ₹299 (वैलिडिटी: 30 दिन)'; 
                feeDisplay.classList.add("active"); 
            } 
            else { 
                feeAmount = 0; 
                feeDisplay.classList.remove("active"); 
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById("toastMessage");
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            toast.className = "toast " + type;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 5000);
        }

        function startNewRegistration() {
            document.getElementById("successBox").style.display = "none"; 
            document.getElementById("payBtn").style.display = "block"; 
            document.getElementById("payBtn").disabled = false;
            document.getElementById("registrationForm").reset(); 
            document.getElementById("feeDisplay").classList.remove("active"); 
            feeAmount = 0;
        }

        function checkDuplicateAndPay() {
            const name = document.getElementById("studentName").value;
            const stuClass = document.getElementById("studentClass").value;
            const mobile = document.getElementById("mobileNo").value;
            const email = document.getElementById("emailId").value;
            const agreeTerms = document.getElementById("agreeTerms").checked; 
            const payBtn = document.getElementById("payBtn");
            const loading = document.getElementById("loading");

            if(!name || !stuClass || !mobile || !email || feeAmount === 0) {
                showToast("कृपया सभी फील्ड सही से भरें!", 'error'); return;
            }

            if(!agreeTerms) {
                showToast("आगे बढ़ने के लिए कृपया 'नियम व शर्तें' स्वीकार करें!", 'error'); 
                return;
            }

            payBtn.disabled = true;
            loading.style.display = "block";
            loading.innerHTML = '<span class="spinner"></span>जानकारी जांची जा रही है...';

            fetch(googleScriptURL, {
                method: 'POST',
                redirect: 'follow',
                body: JSON.stringify({ action: 'checkDuplicate', mobile: mobile, email: email })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "error") {
                    loading.style.display = "none";
                    payBtn.disabled = false;
                    showToast(data.message, 'error'); 
                } else {
                    loading.innerHTML = '<span class="spinner"></span>पेमेंट गेटवे खुल रहा है...';
                    openRazorpay(name, stuClass, mobile, email);
                }
            })
            .catch(err => {
                loading.style.display = "none";
                payBtn.disabled = false;
                showToast('सर्वर त्रुटि! कृपया इंटरनेट चेक करें।', 'error');
            });
        }

        function openRazorpay(name, stuClass, mobile, email) {
            // 👉 अपना असली Razorpay Test Key बदलें
            var options = {
                "key": "rzp_test_SN4NKPK8s1hRpF", 
                "amount": feeAmount * 100,
                "currency": "INR",
                "name": "ज्ञान कम्प्यूटर अकादमी",
                "description": "आधार मॉक टेस्ट (NSEIT) - " + stuClass,
                "prefill": { "name": name, "email": email, "contact": mobile },
                "handler": function(response) {
                    const payId = response.razorpay_payment_id;
                    const username = "UIDAI" + Math.floor(1000 + Math.random() * 9000); 
                    const password = Math.random().toString(36).substr(2, 6);
                    
                    document.getElementById("loading").innerHTML = '<span class="spinner"></span>डेटा सेव हो रहा है...';
                    saveFinalData(name, stuClass, mobile, email, payId, username, password);
                },
                "modal": {
                    "ondismiss": function() {
                        document.getElementById("loading").style.display = "none";
                        document.getElementById("payBtn").disabled = false;
                    }
                },
                "theme": { "color": "#667eea" }
            };
            var rzp1 = new Razorpay(options);
            rzp1.on('payment.failed', function(response) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("payBtn").disabled = false;
                showToast('पेमेंट विफल हो गया!', 'error');
            });
            rzp1.open();
        }

        function saveFinalData(name, stuClass, mobile, email, payId, username, password) {
            // रेफरल कोड की वैल्यू लें
            const refCode = document.getElementById("regReferral").value;

            fetch(googleScriptURL, {
                method: 'POST',
                redirect: 'follow', 
                body: JSON.stringify({
                    action: 'register',
                    name: name, 
                    studentClass: stuClass, 
                    mobile: mobile, 
                    email: email,
                    paymentId: payId, 
                    username: username, 
                    password: password,
                    referralCode: refCode // 👉 यहाँ रेफरल कोड शीट में जा रहा है
                })
            })
            .then(res => res.text()) 
            .then(text => {
                try {
                    const data = JSON.parse(text); 
                    if (data.status === "success") {
                        document.getElementById("loading").style.display = "none";
                        const successBox = document.getElementById("successBox");
                        successBox.style.display = "block";
                        
                        successBox.innerHTML = `
                            रजिस्ट्रेशन सफल!<br>ईमेल और मोबाइल पर लॉगिन आईडी/पासवर्ड भेज दिया गया है।<br><br>
                            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 5px;">
                                <a href="login.html" style="background:#155724; color:white; padding:10px 15px; text-decoration:none; border-radius:5px; font-size:14px;">टेस्ट पोर्टल लॉगिन करें</a>
                                <button type="button" onclick="startNewRegistration()" style="background:#1a73e8; color:white; padding:10px 15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:14px;">नया फॉर्म भरें</button>
                            </div>
                        `;
                        
                        document.getElementById("payBtn").style.display = "none";
                        document.getElementById("registrationForm").reset(); 
                        document.getElementById("feeDisplay").classList.remove("active");
                        feeAmount = 0;
                    } else {
                        document.getElementById("loading").style.display = "none";
                        showToast('Sheet Error: ' + data.message, 'error');
                    }
                } catch (e) {
                    console.error("Google Server Error:", text);
                    document.getElementById("loading").style.display = "none";
                    showToast('डेटा सेव नहीं हुआ! कृपया Apps Script का डिप्लॉयमेंट चेक करें।', 'error');
                }
            })
            .catch(err => {
                document.getElementById("loading").style.display = "none";
                showToast('नेटवर्क की समस्या! डेटा सेव नहीं हो पाया।', 'error');
                console.error('Fetch Error:', err);
            });
        }
    </script>
</body>
</html>
